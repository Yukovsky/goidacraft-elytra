modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''Server-side per-dimension elytra control mod (End / Overworld / Nether).'''
# Server-only mod: vanilla clients and clients without the mod can connect.
displayTest = "IGNORE_ALL_VERSION"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# betterend — optional dependency: its elytras are matched by id and simply don't exist if the mod is absent.
[[dependencies."${mod_id}"]]
modId = "betterend"
type = "optional"
versionRange = "*"
ordering = "NONE"
side = "BOTH"
