modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''Серверный мод управления элитрами по измерениям (Край / Обычный мир / Ад).'''
# Чисто серверный мод: ванильные клиенты и клиенты без мода могут подключаться.
displayTest = "IGNORE_ALL_VERSION"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# betterend — необязательная зависимость: её элитры матчатся по id и при отсутствии мода просто не существуют.
[[dependencies."${mod_id}"]]
modId = "betterend"
type = "optional"
versionRange = "*"
ordering = "NONE"
side = "BOTH"
