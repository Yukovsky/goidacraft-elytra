name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search [existing issues](https://github.com/Yukovsky/goidacraft-elytra/issues) to avoid duplicates.

  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      placeholder: "e.g. 1.0.1"
    validations:
      required: true

  - type: input
    id: env-version
    attributes:
      label: Minecraft / NeoForge Version
      placeholder: "e.g. MC 1.21.1, NeoForge 21.1.228"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Configure mod with ...
        2. Do ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Report
      description: Paste the relevant section from `logs/latest.log` or a crash report.
      render: text

  - type: textarea
    id: other-mods
    attributes:
      label: Other Mods
      description: List any mods that may be relevant (Better End, etc.).
